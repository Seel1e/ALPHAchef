version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "cCnCRLSBMaorX5yBmQGRmR1hHLUVvhg63C_ZiD4kGjQ="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "alphachef_webserver_key"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "false"
    PYTHONPATH: /opt/alphachef
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: alphachef
    DB_USER: alphachef
    DB_PASSWORD: alphachef_pass
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/alphachef/src
    - airflow_tmp:/tmp/alphachef
  user: "50000:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - alphachef_net

services:
  # ──────────────────────────────────────────────
  # Database layer
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_master
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/01_init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - alphachef_net

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alphachef.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alphachef_net

  # ──────────────────────────────────────────────
  # Airflow layer
  # ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@alphachef.local
        && echo 'Airflow initialised.'
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Streamlit dashboard
  # ──────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.runner
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: alphachef
      DB_USER: alphachef
      DB_PASSWORD: alphachef_pass
    volumes:
      - ./dashboard:/app/dashboard
      - ./src:/app/src
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alphachef_net

volumes:
  postgres_data:
  airflow_tmp:

networks:
  alphachef_net:
    driver: bridge
